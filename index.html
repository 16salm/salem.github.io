<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S_U_VF</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* إضافة بعض الأنماط الأساسية */
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #webgl-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .social { position: absolute; bottom: 20px; right: 20px; }
        .social a { color: #fff; text-decoration: none; margin-left: 15px; font-size: 24px; }
        .logo_v { position: absolute; top: 20px; left: 20px; font-size: 32px; font-weight: bold; color: yellow; }
        .text_v { position: absolute; top: 10px; left: 80px; font-size: 16px; font-weight: bold; color: lime; text-shadow: 0 0 5px lime; }
        .typed-cursor { opacity: 1; animation: blink 0.7s infinite; color: lime; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        
        /* تنسيق الصورة */
        #profile-image {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px; /* اضبط الحجم حسب الحاجة */
            height: 150px;
            border-radius: 50%; /* لجعلها دائرية (اختياري) */
            object-fit: cover; /* لضمان تناسب الصورة داخل الإطار */
            border: 2px solid white; /* إطار للصورة (اختياري) */
        }
    </style>
</head>
<body>
    <div class="logo_v">V</div>
    <div class="text_v"><span class="typed_text"></span></div>
    
    <img id="profile-image" src="IMG_3696.jpeg" alt="S_U_VF Profile Image">
    
    <div class="social">
        <a href="https://t.me/kokksha"><i class="fab fa-telegram"></i></a>
        <a href="https://www.instagram.com/_u_vf"><i class="fab fa-instagram"></i></a>
    </div>
    
    <canvas id="webgl-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script src="postprocessing.js"></script>
    <script src="noise.js"></script>
