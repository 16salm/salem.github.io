<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salem Profile</title>
    <!-- المكتبات اللازمة للمؤثرات -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        
        /* طبقة المحتوى فوق المؤثرات */
        .content-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 90%;
            z-index: 10;
            pointer-events: none;
        }

        /* تنسيق صورتك الشخصية */
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
            pointer-events: auto;
            margin-bottom: 20px;
            animation: fadeIn 2s ease-in;
        }

        .typed-wrapper {
            color: white;
            font-size: 1.1rem;
            min-height: 60px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="content-overlay">
    <!-- الصورة التي رفعتها -->
    <img src="IMG_3696.jpeg" alt="Salem" class="profile-img">
    <div class="typed-wrapper">
        <span class="typed_text"></span>
    </div>
</div>

<!-- كود المؤثرات البصرية (نفس الذي كان لديك مع تعديلات لضمان العمل) -->
<script>
    // إعدادات المشهد والألوان
    let scene, camera, renderer, particles;
    const count = 5000;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // بناء الجسيمات
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);

        for(let i = 0; i < count * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 10;
            colors[i] = Math.random();
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.02,
            vertexColors: true,
            transparent: true,
            opacity: 0.8
        });

        particles = new THREE.Points(geometry, material);
        scene.add(particles);

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        particles.rotation.y += 0.002;
        particles.rotation.x += 0.001;
        
        // تغيير الألوان تدريجياً
        const time = Date.now() * 0.0005;
        particles.geometry.attributes.color.array.forEach((v, i) => {
            particles.geometry.attributes.color.array[i] = Math.abs(Math.sin(time + i));
        });
        particles.geometry.attributes.color.needsUpdate = true;

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();

    // تشغيل نص Typed.js
    var typed = new Typed(".typed_text", {
        strings: ["<i>Welcome to my world</i>.", "BELIEVE IN YOURSELF, NOTHING IS IMPOSSIBLE.<br>Telegram: @kokksha<br>Instagram: @_u_vf"],
        typeSpeed: 40,
        backSpeed: 20,
        loop: true
    });
</script>
</body>
</html>
