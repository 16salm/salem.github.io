<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salem Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: radial-gradient(circle at center, #1a0033 0%, #000000 100%); 
            font-family: 'Poppins', sans-serif; 
        }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        
        .content-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 90%;
            z-index: 10;
        }

        /* تنسيق الصورة مع توهج ملون */
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00d2ff;
            box-shadow: 0 0 20px #9137ff, 0 0 40px #00d2ff;
            margin-bottom: 20px;
            animation: pulse 3s infinite alternate;
        }

        /* نصوص ملونة بتدرج (Gradient Text) */
        .typed-wrapper {
            min-height: 60px;
            margin-bottom: 20px;
        }

        .typed_text {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(to right, #00d2ff, #9137ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(145, 55, 255, 0.2);
        }

        /* أزرار التواصل بألوان السيرة الذاتية */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .social-links a {
            color: #fff;
            font-size: 2rem;
            text-decoration: none;
            transition: 0.4s;
            background: linear-gradient(45deg, #00d2ff, #9137ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(145, 55, 255, 0.8));
        }

        .social-links a:hover {
            transform: scale(1.3);
            filter: drop-shadow(0 0 15px #00d2ff);
        }

        @keyframes pulse {
            from { box-shadow: 0 0 20px #9137ff; }
            to { box-shadow: 0 0 40px #00d2ff; transform: scale(1.02); }
        }
    </style>
</head>
<body>

<div class="content-overlay">
    <img src="IMG_3696.jpeg" alt="Salem" class="profile-img">
    
    <div class="typed-wrapper">
        <span class="typed_text"></span>
    </div>

    <div class="social-links">
        <a href="https://t.me/kokksha" target="_blank"><i class="fab fa-telegram"></i></a>
        <a href="https://instagram.com/_u_vf" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>
</div>

<script>
    // --- كود الجسيمات الملونة (Particles) ---
    let scene, camera, renderer, starGeo, stars;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 1000);
        camera.position.z = 1;
        camera.rotation.x = Math.PI/2;

        renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        starGeo = new THREE.BufferGeometry();
        let positions = [];
        for(let i=0; i<6000; i++) {
            positions.push(Math.random() * 600 - 300);
            positions.push(Math.random() * 600 - 300);
            positions.push(Math.random() * 600 - 300);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));

        let sprite = new THREE.TextureLoader().load('https://threejs.org/examples/textures/sprites/disc.png');
        let starMaterial = new THREE.PointsMaterial({
            color: 0x9137ff, // اللون البنفسجي الأصلي
            size: 0.7,
            map: sprite,
            transparent: true,
            blending: THREE.AdditiveBlending
        });

        stars = new THREE.Points(starGeo, starMaterial);
        scene.add(stars);
        animate();
    }

    function animate() {
        const positions = starGeo.attributes.position.array;
        for(let i=1; i<positions.length; i+=3) {
            positions[i] -= 0.5; // سرعة الحركة للأسفل
            if(positions[i] < -300) positions[i] = 300;
        }
        starGeo.attributes.position.needsUpdate = true;
        stars.rotation.y += 0.002;
        
        // تغيير لون النجوم تدريجياً بين الأزرق والبنفسجي
        stars.material.color.setHSL(Math.sin(Date.now()*0.001)*0.2 + 0.7, 1, 0.5);
        
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }

    init();

    // --- نص Typed.js الملون ---
    new Typed(".typed_text", {
        strings: ["Welcome To My Kingdom.", "BELIEVE IN YOURSELF.", "Telegram: @kokksha", "Instagram: @_u_vf"],
        typeSpeed: 70,
        backSpeed: 40,
        loop: true
    });
</script>
</body>
</html>
