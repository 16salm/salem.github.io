<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salem Profile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        canvas { display: block; }
        
        /* تنسيق حاوية الصورة والكلام */
        .content-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            z-index: 100;
            pointer-events: none; /* لضمان تفاعل الجسيمات مع اللمس */
        }

        /* تنسيق الصورة الشخصية */
        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
            pointer-events: auto;
            margin-bottom: 20px;
        }

        .typed_text {
            color: white;
            font-size: 1.2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            line-height: 1.6;
            pointer-events: auto;
        }
    </style>
</head>
<body>

<div class="content-overlay">
    <!-- استبدال الفيديو بصورتك الجديدة -->
    <img src="IMG_3696.jpeg" alt="Profile" class="profile-img">
    
    <!-- نص Typed.js -->
    <div class="typed_text"></div>
</div>

<script>
    // --- إعدادات الجسيمات (Particles) التي أرسلتها ---
    // ملاحظة: وضعت هنا الأكواد التي تدعم حركة الـ Noise والـ Morph
    
    let scene, camera, renderer, particlesGeometry, sourcePositions;
    let sourceVec = new THREE.Vector3(), tempVec = new THREE.Vector3();
    let flowVec = new THREE.Vector3(), currentVec = new THREE.Vector3();

    const CONFIG = {
        particleCount: 5000,
        idleFlowSpeed: 0.2,
        idleFlowStrength: 0.1,
        noiseTimeScale: 0.1,
        noiseFrequency: 0.05
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // إضافة المنطق الخاص بالجسيمات هنا (تكملة الكود الذي أرسلته)
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', onWindowResize);
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
</script>

<script>
    // Typed.js Script
    var options = {
        strings: ["<i>Welcome to my profile</i>.", "BELIEVE IN YOURSELF, NOTHING IS IMPOSSIBLE.<br>Telegram Channel: @kokksha<br>Instagram: @_u_vf"],
        typeSpeed: 50,
        backSpeed: 30,
        loop: true
    };
    var typed = new Typed(".typed_text", options);
</script>

</body>
</html>
